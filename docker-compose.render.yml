# Docker Compose for Render deployment
# This file is optimized for Render's environment
# Usage: docker-compose -f docker-compose.render.yml up -d

services:
  app:
    build: .
    # Don't expose ports - Render handles this
    # port 8000 is internal only
    environment:
      # Use DATABASE_URL from Render's environment
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://*.onrender.com}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=60
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      args:
        # Use the API URL from environment
        VITE_API_URL: ${VITE_API_URL:-https://f1-comedor.onrender.com}
    # Don't expose ports - Render handles this
    # Frontend serves on port 80 internally
    depends_on:
      - app
    restart: unless-stopped

networks:
  default:
    driver: bridge

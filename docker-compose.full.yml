# Full Docker Compose for Render (Frontend + Backend)
# This file includes both frontend and backend in one deploy

services:
  # Backend API
  app:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://*.onrender.com}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=60
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Frontend (served by nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://sintel-gpf1-mexico.onrender.com}
    # No ports - nginx serves on port 80 internally
    depends_on:
      - app
    restart: unless-stopped

  # Nginx as reverse proxy (combines frontend + backend)
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

networks:
  default:
    driver: bridge

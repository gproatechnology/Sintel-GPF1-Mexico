# Docker Compose with Automated Backups
# Usage: docker-compose -f docker-compose.production.yml -f docker-compose.backup.yml up -d

services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: f1comedor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-f1comedor123}
      POSTGRES_DB: f1comedor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - f1-comedor-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U f1comedor -d f1comedor" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.backup.schedule=0 2 * * *"

  # Automated backup service using cron
  backup:
    image: postgres:15
    volumes:
      - ./backups:/backups
      - ./scripts/docker-backup.sh:/backup.sh
    environment:
      - PGPASSWORD=${DB_PASSWORD:-f1comedor123}
    entrypoint: |
      sh -c "
        echo '0 2 * * * /backup.sh' > /etc/crontabs/root &&
        crond -f -l 2
      "
    depends_on:
      - db

# volumes (add to existing)
volumes:
  postgres_data:

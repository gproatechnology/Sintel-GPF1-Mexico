# Production Docker Compose with HTTPS
# Usage: docker-compose -f docker-compose.production.yml up -d

services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: f1comedor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-f1comedor123}
      POSTGRES_DB: f1comedor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - f1-comedor-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U f1comedor -d f1comedor" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://f1comedor:${DB_PASSWORD:-f1comedor123}@db:5432/f1comedor
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_PER_MINUTE: "60"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - f1-comedor-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - f1-comedor-network
    restart: unless-stopped

  # Let's Encrypt certificate renewal
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./frontend/ssl:/etc/nginx/ssl:rw
      - ./frontend/public:/var/www/html:rw
    command: certonly --webroot -w /var/www/html --agree-tos --renew-by-default -d ${DOMAIN:-localhost} -d ${WWW_DOMAIN:-www.localhost}
    profiles:
      - certbot

networks:
  f1-comedor-network:
    driver: bridge

volumes:
  postgres_data:

    # Environment variables to set in .env file:
    # DOMAIN=tu-dominio.com
    # WWW_DOMAIN=www.tu-dominio.com
    # DB_PASSWORD=contraseña_segura
    # SECRET_KEY=clave_secreta_muy_larga
    # ALLOWED_ORIGINS=https://tu-dominio.com
    # VITE_API_URL=https://tu-dominio.com

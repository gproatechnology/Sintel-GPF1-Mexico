# render.yaml - Blueprint for Render deployment
# Separate services: Backend (FastAPI) + Frontend (React)
# https://render.com/docs/yaml

services:
  # ===================
  # Backend (FastAPI)
  # ===================
  - type: web
    name: f1-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: f1comedor
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://f1-frontend.onrender.com"
      - key: DOMAIN
        value: "f1-backend.onrender.com"
      - key: WWW_DOMAIN
        value: "www.f1-backend.onrender.com"

  # ===================
  # Frontend (React)
  # ===================
  # NOTE: When creating this service in Render UI, set Root Directory to "frontend"
  - type: web
    name: f1-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    region: oregon
    envVars:
      - key: VITE_API_URL
        value: "https://f1-backend.onrender.com"

# PostgreSQL Database
databases:
  - name: f1comedor
    region: oregon
    plan: free
    postgresMajorVersion: "15"
